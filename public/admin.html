<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Администратор</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="app-shell wide">
    <section class="hero">
      <div>
        <p class="eyebrow">Панель администратора</p>
        <h1>Услуги и записи</h1>
      </div>
      <a class="admin-link" href="/">Клиент</a>
    </section>

    <section class="panel">
      <label class="field">
        <span>PIN администратора</span>
        <input id="pin" type="password" inputmode="numeric" placeholder="По умолчанию 1234">
      </label>
      <button id="loadAdmin" class="primary" type="button">Войти</button>
      <p id="adminMessage" class="message"></p>
    </section>

    <section class="panel">
      <div class="section-head">
        <div>
          <p class="eyebrow">Общий календарь</p>
          <h2>Расписание</h2>
        </div>
        <button id="todayOverview" class="secondary compact" type="button">Сегодня</button>
      </div>

      <div class="overview-layout">
        <div>
          <div class="calendar-head">
            <button class="icon-button" id="overviewPrevMonth" type="button" aria-label="Предыдущий месяц">‹</button>
            <strong id="overviewMonthTitle"></strong>
            <button class="icon-button" id="overviewNextMonth" type="button" aria-label="Следующий месяц">›</button>
          </div>
          <div class="weekdays">
            <span>Пн</span><span>Вт</span><span>Ср</span><span>Чт</span><span>Пт</span><span>Сб</span><span>Вс</span>
          </div>
          <div id="overviewCalendarGrid" class="calendar-grid"></div>
        </div>

        <div class="week-board">
          <div class="week-head">
            <button class="icon-button" id="overviewPrevWeek" type="button" aria-label="Предыдущая неделя">‹</button>
            <strong id="overviewWeekTitle"></strong>
            <button class="icon-button" id="overviewNextWeek" type="button" aria-label="Следующая неделя">›</button>
          </div>
          <div id="weekDays" class="week-days"></div>
          <div id="dayDetails" class="day-details"></div>
          <div id="bookingStepPanel" class="embedded-booking">
            <h2 id="bookingDateTitle">Создать запись</h2>
            <div id="bookingSlots" class="slots"></div>

            <div id="adminServicePanel" class="is-hidden">
              <label class="field">
                <span>Услуга</span>
                <select id="bookingService"></select>
              </label>
              <div id="bookingServiceMeta" class="muted"></div>
            </div>

            <div id="adminClientPanel" class="is-hidden">
              <label class="field">
                <span>Имя клиента</span>
                <input id="bookingName" placeholder="Имя">
              </label>
              <label class="field">
                <span>Телефон</span>
                <input id="bookingPhone" placeholder="+998 ...">
              </label>
              <button id="createBooking" class="primary" type="button" disabled>Записать клиента</button>
            </div>

            <div id="ownerTools" class="owner-tools is-hidden">
              <label class="field">
                <span>Комментарий владельца</span>
                <input id="blockNote" placeholder="Например, обед или личное время">
              </label>
              <div class="owner-actions">
                <button id="createBlock" class="secondary" type="button" disabled>Зарезервировать время</button>
                <button id="blockWholeDay" class="secondary danger" type="button" disabled>Заблокировать весь день</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="panel">
      <h2>Услуги</h2>
      <div id="servicesList" class="list"></div>
    </section>

    <section class="panel">
      <h2>Добавить услугу</h2>
      <div class="admin-form">
        <label class="field">
          <span>Название</span>
          <input id="serviceName" placeholder="Например, Массаж">
        </label>
        <label class="field">
          <span>Длительность, минут</span>
          <input id="serviceDuration" type="number" min="15" step="15" value="60">
        </label>
        <label class="field">
          <span>Цена</span>
          <input id="servicePrice" type="number" min="0" step="1000" value="0">
        </label>
        <button id="addService" class="primary" type="button">Добавить</button>
      </div>
    </section>
  </main>

  <script src="/admin.js"></script>
</body>
</html>
