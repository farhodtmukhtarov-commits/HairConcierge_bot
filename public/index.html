<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Запись на услугу</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="hero">
      <div>
        <p class="eyebrow">Онлайн-запись</p>
        <h1 id="businessName">Запись на услугу</h1>
      </div>
      <a class="admin-link" href="/admin.html">Админ</a>
    </section>

    <section class="panel">
      <div class="calendar-head">
        <button class="icon-button" id="prevMonth" type="button" aria-label="Предыдущий месяц">‹</button>
        <strong id="monthTitle"></strong>
        <button class="icon-button" id="nextMonth" type="button" aria-label="Следующий месяц">›</button>
      </div>
      <div class="weekdays">
        <span>Пн</span><span>Вт</span><span>Ср</span><span>Чт</span><span>Пт</span><span>Сб</span><span>Вс</span>
      </div>
      <div id="calendarGrid" class="calendar-grid"></div>
      <div class="legend">
        <span><i class="dot free"></i> свободно</span>
        <span><i class="dot busy"></i> есть записи</span>
        <span><i class="dot full"></i> занято</span>
      </div>
    </section>

    <section class="panel is-hidden" id="slotsPanel">
      <h2 id="selectedDateTitle">Выберите дату</h2>
      <div id="slots" class="slots"></div>
    </section>

    <section class="panel is-hidden" id="servicePanel">
      <label class="field">
        <span>Услуга</span>
        <select id="serviceSelect"></select>
      </label>
      <div id="serviceMeta" class="muted"></div>
    </section>

    <section class="panel form-panel is-hidden" id="clientPanel">
      <h2>Ваши данные</h2>
      <label class="field">
        <span>Имя</span>
        <input id="clientName" autocomplete="name" placeholder="Например, Наргиза">
      </label>
      <label class="field">
        <span>Телефон</span>
        <input id="clientPhone" autocomplete="tel" placeholder="+998 ...">
      </label>
      <button id="bookButton" class="primary" type="button" disabled>Записаться</button>
      <p id="message" class="message"></p>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
